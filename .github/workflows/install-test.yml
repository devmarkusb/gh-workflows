name: test cmake install

on:
  workflow_call:
    inputs:
      image:
        description: 'Image to build and install the library under'
        type: string
        required: true
      cxx_standard:
        description: 'C++ standard version to build the library with'
        type: string
        required: true
      namespace:
        description: 'CMake namespace / package ID prefix (e.g. beman for beman::tooling)'
        type: string
        required: true
      include_header:
        description: 'Full header include path for the consumer test'
        type: string
        required: false
      main_header:
        description: 'Name of the main header of the project'
        type: string
        required: false

jobs:
  test-install:
    runs-on: ubuntu-latest
    container: ${{ inputs.image }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'
    - name: Configure CMake (Library)
      env:
        CXX_STANDARD: ${{ inputs.cxx_standard }}
      run:  |
        mkdir -p build/.cmake/api/v1/query
        touch build/.cmake/api/v1/query/codemodel-v2
        cmake -B build -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=./devenv/cmake/fetch-content-from-lockfile.cmake -DCMAKE_CXX_STANDARD="${CXX_STANDARD}" -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/dist"

    - name: Get Library Name
      id: get-lib-name
      shell: bash
      run: |
        shopt -s nullglob
        files=(build/.cmake/api/v1/reply/codemodel-v2-*.json)
        if [ "${#files[@]}" -eq 0 ]; then
          echo "No codemodel-v2 reply file under build/.cmake/api/v1/reply" >&2
          ls -la build/.cmake/api/v1/reply >&2 || true
          exit 1
        fi
        newest="${files[0]}"
        for f in "${files[@]}"; do
          [[ "$f" -nt "$newest" ]] && newest="$f"
        done
        PROJECT_NAME=$(jq -r '.configurations[0].projects[0].name' "$newest")
        echo "name=${PROJECT_NAME#*.}" >> "$GITHUB_OUTPUT"

    - name: Build Library
      run: cmake --build build

    - name: Install Library
      run: cmake --install build

    - name: Verify Installation (Consumer Test)
      env:
        NAMESPACE: ${{ inputs.namespace }}
        INCLUDE_HEADER: ${{ inputs.include_header }}
        MAIN_HEADER: ${{ inputs.main_header }}
        CXX_STANDARD: ${{ inputs.cxx_standard }}
        LIB_NAME: ${{ steps.get-lib-name.outputs.name }}
      run: |
        mkdir consumer && cd consumer
        cat <<EOF > CMakeLists.txt
        cmake_minimum_required(VERSION 3.28)
        project(ConsumerTest LANGUAGES CXX)

        find_package(${NAMESPACE}.${LIB_NAME} REQUIRED)

        add_executable(app main.cpp)

        target_link_libraries(app PRIVATE ${NAMESPACE}::${LIB_NAME})
        EOF

        include_header=${INCLUDE_HEADER}
        if [[ -z "$include_header" ]] ; then
          main_header=${MAIN_HEADER}
          if [[ -z "$main_header" ]] ; then
            main_header="${LIB_NAME}.hpp"
          fi
          include_header="${NAMESPACE}/${LIB_NAME}/${main_header}"
        fi

        cat <<EOF > main.cpp
        #include "${include_header}"

        int main() {
            return 0;
        }

        EOF

        cmake -B build -DCMAKE_CXX_STANDARD="${CXX_STANDARD}" -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/dist"

        cmake --build build
