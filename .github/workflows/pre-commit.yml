name: pre-commit check

on:
  workflow_call:

# Inline pre-commit install + cache instead of pre-commit/action@v3.0.1, which still pins actions/cache@v4 (Node 20).
jobs:
  pre-commit-push:
    name: pre-commit check on Push
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: pip freeze (debug)
        run: python -m pip freeze --local

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-3|${{ env.pythonLocation }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: pre-commit run --show-diff-on-failure --color=always --all-files

  pre-commit-pr:
    name: pre-commit check on PR
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request_target' }}

    permissions:
      contents: read
      checks: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

        # pull_request_target checkout the base of the repo
        # We need to checkout the actual pr to lint the changes.
      - name: Checkout pr
        run: gh pr checkout ${{ github.event.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: pip freeze (debug)
        run: python -m pip freeze --local

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-3|${{ env.pythonLocation }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - id: run-pre-commit
        name: Run pre-commit
        run: pre-commit run --show-diff-on-failure --color=always --all-files

        # reviewdog posts suggested changes from pre-commit on the PR when hooks fail.
      - name: suggester / pre-commit
        uses: reviewdog/action-suggester@v1
        if: ${{ failure() && steps.run-pre-commit.conclusion == 'failure' }}
        with:
          tool_name: pre-commit
          level: warning
          reviewdog_flags: "-fail-level=error"
